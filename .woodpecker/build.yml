# .woodpecker/build.yml
# Core Emacs build, Spacemacs compatibility, and sequential Neovim source-build test

when:
  event: [push, pull_request, manual]

variables:
  - &gcc_version "12"
  - &emacs_image "debian:bookworm-slim"

steps:
  - name: build-and-verify-emacs
    image: *emacs_image
    environment:
      DEBIAN_FRONTEND: noninteractive
      CI: "true"
      CI_INSTALL: "true"
      GCC_VERSION: *gcc_version
    commands:
      - set -ex
      - chmod +x build_emacs30.sh common_utils.sh || true
      - ./build_emacs30.sh
      - echo "=== Build complete, verifying Emacs ==="
      - |
          export PATH="$HOME/.local/bin:$PATH"
          test -x "$HOME/.local/bin/emacs"
          "$HOME/.local/bin/emacs" --version
      - echo "=== Testing Spacemacs compatibility ==="
      - git clone --depth 1 --branch develop https://github.com/syl20bnr/spacemacs ~/.emacs.d
      - |
          "$HOME/.local/bin/emacs" --batch --eval "(progn
              (require 'package)
              (setq package-archives '((\"melpa\" . \"https://melpa.org/packages/\")
                                       (\"gnu\" . \"https://elpa.gnu.org/packages/\")))
              (package-initialize)
              (message \"Package system initialized successfully\"))"
      - echo "=== Spacemacs compatibility check passed! ==="

  - name: build-and-verify-neovim
    image: *emacs_image
    depends_on:
      - build-and-verify-emacs
    environment:
      DEBIAN_FRONTEND: noninteractive
      CI: "true"
      CI_INSTALL: "true"
    commands:
      - set -ex
      - apt-get update
      - apt-get install -y --no-install-recommends nodejs npm python3 python3-pip python3-venv
      - chmod +x build_neovim.sh common_utils.sh ci/neovim-smoke.sh || true
      - echo "=== Running Neovim source-build smoke after Emacs ==="
      - NVIM_INSTALL_MODE=source ./ci/neovim-smoke.sh
      - echo "=== Neovim source-build smoke passed! ==="
