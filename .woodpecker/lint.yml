# .woodpecker/lint.yml
# Shell script linting

when:
  event: [push, pull_request, manual]

steps:
  - name: shellcheck
    image: koalaman/shellcheck-alpine:stable
    commands:
      - shellcheck --source-path=SCRIPTDIR -x *.sh
      - ./check_codex_config.sh

  - name: macos-runner-policy
    image: python:3.14-alpine
    commands:
      - python3 ci/validate-macos-pipeline.py .woodpecker/macos.yml --default-branch master
