# .woodpecker/notify-success.yml
# Discord notification after all pipelines complete successfully

when:
  event: [push, pull_request, manual]

skip_clone: true

depends_on:
  - build
  - layers
  - lint
  - noadmin

runs_on: [success]

steps:
  - name: notify-success
    image: appleboy/drone-discord
    settings:
      webhook_id:
        from_secret: discord_id
      webhook_token:
        from_secret: discord_token
      message: >
        ✅ **Success**: {{repo.name}} ({{commit.branch}})
        {{commit.message}}
        {{build.link}}
