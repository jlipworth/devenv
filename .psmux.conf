# First-pass psmux config migrated from ~/.tmux.conf.local
# Goal: keep your workflow, avoid Oh My Tmux shell hacks, stay psmux-native.
#
# Install plugins after first launch with: Prefix + I

##### core behavior ############################################################

set -g default-shell pwsh
set -g default-terminal "tmux-256color"

set -g history-limit 50000
set -g mouse on
set -g mode-keys vi
set -g focus-events on
set -g allow-passthrough on
set -g set-clipboard on

set -g escape-time 10
set -g repeat-time 600
set -g display-time 1000
set -g display-panes-time 800
set -g status-interval 10

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g set-titles on

##### prefixes #################################################################

set -g prefix `
set -g prefix2 C-b
bind-key ` send-prefix
bind-key C-b send-prefix -2

##### useful bindings ##########################################################

# reload config
bind-key r source-file ~/.psmux.conf \; display-message "~/.psmux.conf sourced"

# create / find / switch sessions
bind-key C-c new-session
bind-key C-f command-prompt -p "find-session" "switch-client -t '%%'"
bind-key BTab switch-client -l

# splits
bind-key - split-window -v
bind-key _ split-window -h

# pane navigation
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R
bind-key < swap-pane -U
bind-key > swap-pane -D

# pane resizing
bind-key -r H resize-pane -L 2
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2

# window navigation
unbind-key n
unbind-key p
bind-key -r C-h previous-window
bind-key -r C-l next-window
bind-key -r C-S-H swap-window -t -1 \; select-window -t -1
bind-key -r C-S-L swap-window -t +1 \; select-window -t +1
bind-key Tab last-window

# toggle mouse
bind-key m if-shell -F "#{mouse}" \
  "set -g mouse off \; display-message 'mouse off'" \
  "set -g mouse on \; display-message 'mouse on'"

##### copy mode ################################################################

bind-key Enter copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi H send -X start-of-line
bind-key -T copy-mode-vi L send -X end-of-line

##### session folding ##########################################################

# Fold current window into another session
bind-key S command-prompt -p "Send window to session:" -T target { move-window -t "%%" }

# Fold current pane into another session's active window
bind-key G command-prompt -p "Send pane to session:" -T target { join-pane -h -t "%%" }

# TODO:
# Your old "pop pane to new session" helper was bash-based (bin/tmux-pop-pane).
# Skip it for now; re-add later as a PowerShell helper if you miss it.

##### plugins ##################################################################

set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-resurrect'
set -g @plugin 'psmux-plugins/psmux-continuum'
set -g @plugin 'psmux-plugins/psmux-theme-dracula'

# resurrect / continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-dir '~/.psmux/resurrect'

# dracula theme tuning
set -g @dracula-show-powerline 'on'
set -g @dracula-show-left-icon 'session'
set -g @dracula-border-contrast 'off'
set -g @dracula-show-flags 'on'

# Keep PPM init at the bottom
run '~/.psmux/plugins/ppm/ppm.ps1'
